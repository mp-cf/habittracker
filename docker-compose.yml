version: '3.9'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://habituser:password@db:5432/habittracker
      - APP_PASSWORD=letmein
    depends_on:
      - db
    volumes:
      - ./data:/app/data

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: habituser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: habittracker
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
